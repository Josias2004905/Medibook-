{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Specialties — MediBook{% endblock %}
{% block content %}
<div class="page-header"><div class="container d-flex justify-content-between align-items-center"><h1><i class="fas fa-stethoscope me-2"></i>Specialties</h1><a href="{% url 'specialty_create' %}" class="btn btn-medibook-primary"><i class="fas fa-plus me-1"></i>Add</a></div></div>
<div class="container pb-5">
    <div class="card-dark overflow-hidden">
        <div class="table-responsive">
            <table class="table table-dark-custom mb-0">
                <thead><tr><th>Name</th><th>Icon</th><th>Actions</th></tr></thead>
                <tbody>
                    {% for s in specialties %}
                    <tr>
                        <td style="color:#E8F0FE;font-weight:600;">{{ s.name }}</td>
                        <td><i class="fas {{ s.icon }}" style="color:#4DA6FF;"></i></td>
                        <td>
                            <a href="{% url 'specialty_edit' s.pk %}" class="btn btn-sm btn-outline-medibook me-1">Edit</a>
                            <a href="{% url 'specialty_delete' s.pk %}" class="btn btn-sm" style="background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);color:#E74C3C;">Del</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="3" class="text-center py-4" style="color:rgba(232,240,254,0.4);">No specialties yet.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
