{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Doctor Profile — MediBook{% endblock %}
{% block content %}
<div class="page-header"><div class="container"><h1><i class="fas fa-user-md me-2"></i>Edit Doctor Profile</h1></div></div>
<div class="container pb-5" style="max-width:680px;">
    <div class="card-dark p-4">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-4 py-2.5">
                <i class="fas fa-save me-2"></i>Update Profile
            </button>
        </form>
    </div>
</div>
{% endblock %}
