{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Add Leave — MediBook{% endblock %}
{% block content %}
<div class="page-header"><div class="container"><h1><i class="fas fa-plane me-2"></i>Add Leave Period</h1></div></div>
<div class="container pb-5" style="max-width:560px;">
    <div class="card-dark p-4">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-warning w-100 mt-4 py-2.5">
                <i class="fas fa-plane me-2"></i>Add Leave
            </button>
        </form>
        <a href="{% url 'leave_list' %}" class="btn btn-outline-medibook mt-2"><i class="fas fa-arrow-left me-1"></i>Back</a>
    </div>
</div>
{% endblock %}
