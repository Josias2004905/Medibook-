{% extends 'base.html' %}
{% block title %}Medical Info — MediBook{% endblock %}
{% block content %}
<div class="page-header"><div class="container"><h1><i class="fas fa-heartbeat me-2"></i>Medical Information</h1></div></div>
<div class="container pb-5" style="max-width:620px;">
    <div class="card-dark p-4">
        {% load crispy_forms_tags %}
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-4 py-2.5">
                <i class="fas fa-save me-2"></i>Save Information
            </button>
        </form>
        <a href="{% url 'patient_dashboard' %}" class="btn btn-outline-medibook mt-2"><i class="fas fa-arrow-left me-1"></i>Back</a>
    </div>
</div>
{% endblock %}
