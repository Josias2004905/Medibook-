{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Create Account — MediBook{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5 z-1" style="background:radial-gradient(ellipse at top, rgba(10,255,233,0.04) 0%, transparent 60%);">
    <div class="w-100" style="max-width:480px;padding:0 1rem;">
        <!-- Auth Card -->
        <div class="auth-card animate-in" style="max-width:480px;">
            <!-- Logo -->
            <div class="auth-logo">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h1 style="font-family:var(--font-heading);font-size:1.6rem;font-weight:700;color:var(--text-primary);text-align:center;margin-bottom:8px;">Join MediBook</h1>
            <p style="color:var(--text-secondary);text-align:center;font-size:0.9rem;margin-bottom:32px;">Create your free patient account</p>

            <form method="post" id="registerForm">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-4 py-3" style="font-size:0.95rem;font-weight:600;letter-spacing:0.03em;">
                    <i class="fa-solid fa-user-plus me-2"></i>Create Account
                </button>
            </form>

            <div class="text-center mt-4" style="padding-top:20px;border-top:1px solid var(--border-subtle);">
                <span style="color:var(--text-muted);font-size:0.875rem;">Already have an account?</span>
                <a href="{% url 'login' %}" style="color:var(--primary);font-weight:600;font-size:0.875rem;margin-left:4px;">Sign in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
