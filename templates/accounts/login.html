{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Sign In — MediBook{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5 z-1" style="background:radial-gradient(ellipse at top, rgba(10,255,233,0.04) 0%, transparent 60%);">
    <div class="w-100" style="max-width:440px;padding:0 1rem;">
        <!-- Auth Card -->
        <div class="auth-card animate-in">
            <!-- Logo -->
            <div class="auth-logo">
                <i class="fa-solid fa-plus"></i>
            </div>
            <h1 style="font-family:var(--font-heading);font-size:1.6rem;font-weight:700;color:var(--text-primary);text-align:center;margin-bottom:8px;">Welcome back</h1>
            <p style="color:var(--text-secondary);text-align:center;font-size:0.9rem;margin-bottom:32px;">Sign in to your MediBook account</p>

            <form method="post" id="loginForm">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username">Username</label>
                    <div class="position-relative">
                        <input type="text" id="username" name="username" class="form-control" placeholder="Your username"
                               value="{{ username|default:'' }}" style="padding-left:40px;" required>
                        <i class="fa-solid fa-user" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.85rem;"></i>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password">Password</label>
                    <div class="position-relative">
                        <input type="password" id="password" name="password" class="form-control" placeholder="Your password"
                               style="padding-left:40px;padding-right:44px;" required>
                        <i class="fa-solid fa-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.85rem;"></i>
                        <button type="button" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px 8px;" onclick="togglePwd()">
                            <i class="fa-solid fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-medibook-primary w-100" style="padding:14px;font-size:0.95rem;">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </button>
            </form>

            <div class="text-center mt-4" style="padding-top:20px;border-top:1px solid var(--border-subtle);">
                <span style="color:var(--text-muted);font-size:0.875rem;">Don't have an account?</span>
                <a href="{% url 'register' %}" style="color:var(--primary);font-weight:600;font-size:0.875rem;margin-left:4px;">Register free</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePwd() {
    const p = document.getElementById('password');
    const e = document.getElementById('eyeIcon');
    if (p.type === 'password') { p.type = 'text'; e.className = 'fa-solid fa-eye-slash'; }
    else { p.type = 'password'; e.className = 'fa-solid fa-eye'; }
}
</script>
{% endblock %}
